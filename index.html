<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Real Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: var(--tg-theme-bg-color, #1e1e1e); color: var(--tg-theme-text-color, #ffffff); font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", Roboto, sans-serif; margin: 0; padding: 16px; box-sizing: border-box; }
        .card { background: var(--tg-theme-secondary-bg-color, #2a2a2a); border-radius: 20px; padding: 24px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .title { font-size: 14px; font-weight: 500; color: var(--tg-theme-hint-color, #aaaaaa); }
        .balance { font-size: 34px; font-weight: 800; margin: 4px 0; letter-spacing: -0.5px; }
        .profit { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .profit.up { color: #ff3b30; }
        .profit.down { color: #007aff; }
        .stock-list { list-style: none; padding: 0; margin: 0; }
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(150,150,150,0.1); }
        .stock-item:last-child { border-bottom: none; padding-bottom: 0; }
        .stock-info h4 { margin: 0; font-size: 16px; font-weight: 700; }
        .stock-info p { margin: 4px 0 0; font-size: 13px; color: var(--tg-theme-hint-color, #aaaaaa); }
        .stock-price { text-align: right; }
        .stock-price h4 { margin: 0; font-size: 16px; font-weight: 700; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 800; margin-top: 6px; }
        .badge.up { background: rgba(255, 59, 48, 0.15); color: #ff3b30; }
        .badge.down { background: rgba(0, 122, 255, 0.15); color: #007aff; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animated { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
    </style>
</head>
<body>

    <div class="card animated">
        <div class="header">
            <span class="title">총 자산 평가액</span>
            <span style="font-size: 22px;">💎</span>
        </div>
        <div class="balance" id="totalValue">로딩중...</div>
        <div class="profit" id="totalProfit">-</div>
    </div>

    <div class="card animated delay-1">
        <div class="title" style="margin-bottom: 16px;">포트폴리오 비중</div>
        <div style="position: relative; height: 220px;">
            <canvas id="portfolioChart"></canvas>
        </div>
    </div>

    <div class="card animated delay-2">
        <div class="title" style="margin-bottom: 8px;">보유 종목 상세</div>
        <ul class="stock-list" id="stockList">
            <p style="text-align:center; color:gray; font-size: 13px;">데이터를 불러오는 중입니다...</p>
        </ul>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // 1. 봇이 URL 뒤에 몰래 붙여서 보낸 진짜 데이터 파싱하기
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');

        // 기본값 (연결 실패 시 보여줄 임시 데이터)
        let portfolio = {
            total: 0, profit_amount: 0, profit_rate: 0,
            items: [{ name: "데이터를 불러오지 못했습니다.", shares: 0, value: 0, rate: 0 }]
        };

        // 진짜 데이터가 있으면 덮어쓰기
        if (dataParam) {
            try { 
                portfolio = JSON.parse(decodeURIComponent(dataParam)); 
            } catch (e) { console.error("데이터 파싱 에러:", e); }
        }

        // 2. 숫자에 콤마(,) 찍는 포맷 함수
        const formatNum = (num) => Math.round(num).toLocaleString('ko-KR');
        
        // 3. 총 자산 & 수익률 화면에 입력
        document.getElementById('totalValue').innerText = formatNum(portfolio.total) + ' 원';
        
        const profitEl = document.getElementById('totalProfit');
        if (portfolio.profit_rate >= 0) {
            profitEl.innerHTML = `▲ ${formatNum(portfolio.profit_amount)} (${portfolio.profit_rate}%)`;
            profitEl.className = 'profit up';
        } else {
            profitEl.innerHTML = `▼ ${formatNum(Math.abs(portfolio.profit_amount))} (${portfolio.profit_rate}%)`;
            profitEl.className = 'profit down';
        }

        // 4. 종목 리스트와 차트 데이터 그리기
        const listEl = document.getElementById('stockList');
        listEl.innerHTML = ''; // 초기화
        
        let chartLabels = [];
        let chartData = [];
        let chartColors = ['#FF2D55', '#007AFF', '#34C759', '#FFCC00', '#AF52DE'];

        portfolio.items.forEach((item, index) => {
            chartLabels.push(item.name);
            chartData.push(item.value);

            const rateClass = item.rate >= 0 ? 'up' : 'down';
            const rateArrow = item.rate >= 0 ? '▲' : '▼';
            
            listEl.innerHTML += `
                <li class="stock-item">
                    <div class="stock-info">
                        <h4>${item.name}</h4>
                        <p>${item.shares > 0 ? item.shares + '주' : '기타/현금'}</p>
                    </div>
                    <div class="stock-price">
                        <h4>${formatNum(item.value)} 원</h4>
                        <div class="badge ${rateClass}">${rateArrow} ${Math.abs(item.rate)}%</div>
                    </div>
                </li>
            `;
        });

        // 5. 원형 차트 생성
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: chartLabels,
                datasets: [{
                    data: chartData,
                    backgroundColor: chartColors.slice(0, chartLabels.length),
                    borderWidth: 0, hoverOffset: 6
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '75%',
                plugins: {
                    legend: { position: 'bottom', labels: { color: window.Telegram.WebApp.colorScheme === 'dark' ? '#fff' : '#000', padding: 20 } }
                }
            }
        });
    </script>
</body>
</html>
